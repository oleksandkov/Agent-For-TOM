# Alembic config for TOM backend.
#
# Run with `uv run alembic ...` from packages/backend/.
# `script_location` is a relative path; `env.py` imports TOM's SQLCipher
# engine factory and the ORM metadata, so the standard `sqlalchemy.url`
# setting is intentionally left blank.

[alembic]
script_location = src/backend/tom/db/migrations
prepend_sys_path = src
path_separator = os
file_template = %%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40

# Standard lifecycle hooks. env.py builds the engine via TOM's make_engine.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
