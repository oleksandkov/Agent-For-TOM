[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tom-backend"
version = "0.1.0"
description = "TOM backend (local-first personal AI agent)"
readme = "../../README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "TOM contributors" },
]
dependencies = [
  "letta==0.16.8",
  "mcp>=1.0.0",
  "sqlalchemy>=2.0",
  "alembic>=1.13",
  "pydantic>=2.6",
  "fastapi>=0.110",
  "uvicorn[standard]>=0.27",
  "httpx>=0.27",
  "keyring>=24.0",
  "sqlcipher3>=0.5.0",
  "sqlite-vec>=0.1.0",
  "python-dotenv>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/backend"]
include = ["src/backend/tom/py.typed"]

[tool.hatch.build.targets.sdist]
include = [
  "src/backend",
  "tests",
  "README.md",
]

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.4",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src/backend/tom"]
mypy_path = "src"
explicit_package_bases = true

[[tool.mypy.overrides]]
module = [
  "sqlcipher3.*",
  "sqlite_vec.*",
  "mcp.*",
  "letta.*",
]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "B",
  "UP",
  "N",
  "SIM",
  "RUF",
]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

[tool.coverage.run]
branch = true
source = ["backend.tom"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 0